<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>不具合データ管理アプリ（実働MVP）</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container header-inner">
      <h1>不具合データ管理アプリ</h1>
      <div class="header-actions">
        <button class="ghost" type="button">ログイン中: leader01</button>
        <button id="exportBtn" class="primary" type="button">CSV出力</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>検索条件</h2>
      <form class="grid grid-5" onsubmit="return false;">
        <label>発生日From<input id="qFrom" type="date"></label>
        <label>発生日To<input id="qTo" type="date"></label>
        <label>部品番号<input id="qPart" type="text" placeholder="例: PN-1234"></label>
        <label>ステータス
          <select id="qStatus">
            <option value="">すべて</option>
            <option>未対応</option>
            <option>対応中</option>
            <option>完了</option>
          </select>
        </label>
        <label>顧客影響
          <select id="qImpact">
            <option value="">すべて</option>
            <option>なし</option>
            <option>軽微</option>
            <option>重大</option>
          </select>
        </label>
      </form>
      <div class="actions inline">
        <button id="searchBtn" class="primary" type="button">検索</button>
        <button id="resetBtn" type="button">条件クリア</button>
      </div>
    </section>

    <section class="card">
      <h2>不具合登録 / 編集</h2>
      <form id="defectForm" class="grid grid-3">
        <p id="modeBadge" class="badge">新規登録モード</p>
        <p id="message" class="message" data-kind="info"></p>
        <label>発生日<input name="occurrenceDate" type="date" required></label>
        <label>部品番号<input name="partNumber" type="text" required></label>
        <label>対象缶<input name="targetCan" type="text" required></label>
        <label>対象数<input name="targetCount" type="number" min="0" required></label>
        <label>流動数<input name="inProcessCount" type="number" min="0" required></label>
        <label>廃却数<input name="discardCount" type="number" min="0" required></label>
        <label>確認項目<input name="checkItem" type="text" required></label>
        <label>測定値<input name="measurementValue" type="text" placeholder="例: 2.4mm"></label>
        <label>顧客への影響
          <select name="customerImpact" required>
            <option value="">選択してください</option>
            <option>なし</option>
            <option>軽微</option>
            <option>重大</option>
          </select>
        </label>
        <label>ステータス
          <select name="status" required>
            <option>未対応</option>
            <option>対応中</option>
            <option>完了</option>
          </select>
        </label>
        <label class="file">異常処置報告書PDF
          <input id="pdfFiles" type="file" accept="application/pdf" multiple>
        </label>
      </form>
      <div class="actions">
        <button id="saveBtn" class="primary" type="submit" form="defectForm">保存</button>
        <button id="clearEditBtn" type="button">編集解除</button>
      </div>
    </section>

    <section class="card">
      <h2>不具合一覧</h2>
      <table>
        <thead>
          <tr>
            <th>発生日</th><th>部品番号</th><th>対象缶</th><th>対象数</th><th>流動数</th><th>廃却数</th><th>顧客影響</th><th>ステータス</th><th>添付</th><th>作成日</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="defectTableBody"></tbody>
      </table>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
